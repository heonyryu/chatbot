<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음이와 함께하는 윤리 교실</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app-container { width: 420px; height: 680px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        
        #login-screen { padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        input { padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 16px; outline: none; }
        button { padding: 15px; background: #3498db; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #2980b9; }

        #chat-container { display: none; flex-direction: column; height: 100%; }
        #chat-header { background: #3498db; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .user { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #ecf0f1; color: #2c3e50; border-bottom-left-radius: 4px; }
        
        /* [추가] 타이핑 애니메이션 CSS */
        .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 5px 0; }
        .dot { width: 6px; height: 6px; background-color: #888; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 5px; background: white; }
        #user-msg { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; outline: none; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="login-screen">
        <h2 style="color:#2c3e50;">🌱 편안한 대화 상대 '마음이'</h2>
        <input type="text" id="student-id" placeholder="네 이름을 알려줘!">
        <button onclick="startApp()">대화 시작하기</button>
    </div>

    <div id="chat-container">
        <div id="chat-header">🌟 내 마음의 멘토, 마음이</div>
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-msg" placeholder="마음이에게 이야기를 들려줘..." onkeypress="if(event.keyCode==13) sendToAI()">
            <button onclick="sendToAI()" style="background:#3498db; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">전송</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ 선생님의 API 키와 GAS URL을 넣어주세요!
    const API_KEY = 'AIzaSyBt_l-y5uEAUBo-ra36wzaIjzArGqm9Ocs'; 
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzJZCHx5qnCcPw2ypwPIC_36UI3HIm6qSFfjf7aOMDsas14dP2VTaLFPtibcORjx1hnTA/exec'; 
    
    const ETHICAL_INSTRUCTION = `너는 초등학교 5학년 학생들의 편안한 대화 상대이자 상담 멘토인 '마음이'야.
    1. [호칭 및 말투]: 학생의 이름(예: "길동아")이나 "너"라고 부르고, 친한 동네 형이나 누나처럼 자연스러운 구어체(반말)를 써.
    2. [공감 후 꼬리질문]: 아이의 말에 진심으로 공감해 준 다음, 대화가 끊기지 않도록 반드시 부드러운 질문을 하나 던져서 아이가 상황을 더 자세히 이야기하도록 이끌어줘. 
    3. [은근한 멘토링]: 아이가 나쁜 행동을 하려 할 때는 혼내지 말고, "만약 그렇게 하면 마음이 편할까?"처럼 스스로 생각할 수 있게 물어봐줘.
    4. [길이 조절]: 모바일 메신저로 대화하듯 2~3문장 정도로 자연스럽게 대답해.`;

    let studentId = '';
    let chatHistory = []; 

    async function startApp() {
        studentId = document.getElementById('student-id').value.trim();
        if (!studentId) return alert("이름을 입력해줘!");
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-container').style.display = 'flex';
        
        const win = document.getElementById('chat-window');
        showLoading(win); // 로딩 표시
        
        try {
            const response = await fetch(`${GAS_URL}?studentId=${encodeURIComponent(studentId)}`);
            const history = await response.json();
            
            removeLoading(); // 로딩 제거
            win.innerHTML = ''; 

            if(history.length > 0) {
                history.forEach(log => {
                    addMessage(log.role === 'user' ? 'user' : 'ai', log.text);
                    chatHistory.push({ role: log.role === 'user' ? 'user' : 'model', parts: [{ text: log.text }] });
                });
                addMessage('ai', `${studentId}아, 왔어? 아까 하던 이야기 계속해볼까?`);
            } else {
                addMessage('ai', `안녕 ${studentId}아! 만나서 정말 반가워. 오늘 하루는 어땠어?`);
            }
        } catch (e) {
            removeLoading(); // 로딩 제거
            win.innerHTML = '';
            addMessage('ai', `안녕 ${studentId}아! 만나서 반가워. 오늘 기분은 어때?`);
        }
    }

    async function sendToAI() {
        const input = document.getElementById('user-msg');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', text);
        input.value = '';
        saveLog('user', text);

        chatHistory.push({ role: "user", parts: [{ text: text }] });
        
        const win = document.getElementById('chat-window');
        showLoading(win); // [추가] 사용자가 메시지를 보내면 로딩 애니메이션 띄우기

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: ETHICAL_INSTRUCTION }] },
                    contents: chatHistory.slice(-10) 
                })
            });
            
            const data = await response.json();
            
            removeLoading(); // [추가] 답변이 도착하면 로딩 애니메이션 지우기

            if (data.error) {
                throw new Error(data.error.message);
            }

            const aiText = data.candidates[0].content.parts[0].text;
            addMessage('ai', aiText);
            saveLog('ai', aiText);
            
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });
            
        } catch (e) { 
            console.error(e);
            removeLoading(); // 에러가 나도 로딩 애니메이션 지우기
            addMessage('ai', `앗, 에러가 났어! 잠시 후에 다시 말해줄래? (${e.message})`); 
        }
    }

    // 화면에 말풍선 띄우는 함수
    function addMessage(sender, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    // [추가] 타이핑 애니메이션 띄우는 함수
    function showLoading(container) {
        const div = document.createElement('div');
        div.id = 'loading-bubble';
        div.className = 'msg ai';
        div.innerHTML = `
            <div style="font-size:12px; color:#888; margin-bottom:4px;">마음이가 생각 중이에요</div>
            <div class="typing-indicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // [추가] 타이핑 애니메이션 지우는 함수
    function removeLoading() {
        const loadingBubble = document.getElementById('loading-bubble');
        if (loadingBubble) {
            loadingBubble.remove();
        }
    }

    async function saveLog(role, text) {
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ studentId: studentId, role: role, text: text }) });
    }
</script>
</body>
</html>
